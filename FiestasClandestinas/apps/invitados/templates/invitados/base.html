<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Invitados — Fiestas Clandestinas{% endblock %}</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13101f;
            --surface-2: #1c1730;
            --border: #2a1f45;
            --text: #f0e6ff;
            --muted: #8b7aa0;
            --accent: #ff006e;
            --accent-2: #8338ec;
            --success: #00f5a0;
            --danger: #ff4757;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2.5rem 1.5rem;
            line-height: 1.5;
        }
        .container { max-width: 760px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: var(--muted);
            margin-top: 0.6rem;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .flash {
            background: var(--surface-2);
            border-left: 3px solid var(--accent);
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        .flash.error { border-left-color: var(--danger); }
        .flash.success { border-left-color: var(--success); }
        .card {
            background: linear-gradient(160deg, var(--surface), var(--surface-2));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.8rem;
            margin-bottom: 1.2rem;
            transition: border-color 0.25s, transform 0.25s;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .fiesta-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }
        .meta {
            display: grid;
            gap: 0.35rem;
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }
        .meta span strong { color: var(--text); font-weight: 600; }
        .invitee {
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
            font-size: 1rem;
            color: var(--text);
        }
        .invitee strong { color: var(--accent-2); }
        .actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.3rem;
        }
        .actions form { flex: 1; }
        button {
            width: 100%;
            padding: 0.85rem 1rem;
            border: none;
            border-radius: 9px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
        }
        .btn-accept {
            background: linear-gradient(135deg, var(--success), #00d9f5);
            color: var(--bg);
        }
        .btn-reject {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        button:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 14px;
        }
        .empty h2 { color: var(--text); margin-bottom: 0.5rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Invitaciones</h1>
            <p class="tagline">Portal de invitados · Fiestas Clandestinas</p>
        </header>

        {% if messages %}
            {% for message in messages %}
                <div class="flash {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
