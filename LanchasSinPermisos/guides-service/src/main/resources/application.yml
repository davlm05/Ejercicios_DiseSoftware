micronaut:
  application:
    name: guides
  server:
    port: 8082
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - http://localhost:5173
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS

datasources:
  default:
    url: jdbc:h2:file:./data/guides-db;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    dialect: H2

flyway:
  datasources:
    default:
      enabled: true
